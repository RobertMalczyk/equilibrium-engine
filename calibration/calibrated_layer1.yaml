# Layer-1 calibration result -- the frozen base for Layer 2. NOT defaults.yaml (defaults stays
# placeholders). Each half-life carries a STATUS so nobody reads a placeholder as a calibrated value:
#   calibrated  = a layer-1 contract DROVE it (a real gradient); renegotiating it = a conscious target change.
#   placeholder = NO layer-1 contract constrained it (flat loss region) -> the value is the seed, NOT a
#                 measurement. Layer 2 may pin some of these via GAINS; it must not treat them as frozen.
# Provenance applies to the ABSENCE of a value too: "only satisfaction calibrated" is a finding, not an omission.
layer: 1
seed: 1
optimizer: "cma==4.4.4"
result: {best_total: 0.0000, accepted: true, note: "satisfaction re-confirmed deterministically (seed=1)"}

