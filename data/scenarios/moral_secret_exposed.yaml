# M-J.4.3 Secret lifecycle -- EXPOSURE inactivates the secret. The persona hides a secret (it weighs as
# stress while ACTIVE), then it is publicly EXPOSED (`secret_exposed`, witnesses): known_by fills, hidden_from
# empties -> the secret becomes INACTIVE and stops weighing (salience no longer drives stress). Run with the
# moral overlay.
id: moral_secret_exposed
persona: halgrim
initial_overrides:
  global_state:
    fatigue: 0.05
    boredom: 0.05
    stress: 0.05
    frustration: 0.05
    anger: 0.05
  secrets:
    - id: s_theft
      owner_id: self
      topic: theft
      category: crime
      hidden_from: [guard]
      stakes: 0.8
      moral_weight: 0.7
      unresolvedness: 0.0
# t0-4 the secret is cued (active -> weighs); t5 it is EXPOSED publicly (witnesses) -> inactive; t6-9 further
# cues no longer raise salience (gated) and it no longer weighs.
events:
  - {type: secret_cued,   t: 0, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 1, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 2, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 3, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 4, topic: theft, intensity: 1.0}
  - {type: secret_exposed, t: 5, topic: theft, intensity: 1.0, context: {witnesses: [guard, warden, cook]}}
  - {type: secret_cued,   t: 6, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 7, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 8, topic: theft, intensity: 1.0}
  - {type: secret_cued,   t: 9, topic: theft, intensity: 1.0}
