# M-J.4.3 Secret lifecycle -- an ACTIVE secret WEIGHS. The persona carries a secret it is hiding from the
# guard; reminders (`secret_cued`) raise its salience, and while ACTIVE (hidden_from non-empty) that salience
# weighs as stress. Run with the moral overlay.
id: moral_secret
persona: halgrim
initial_overrides:
  global_state:
    fatigue: 0.05
    boredom: 0.05
    stress: 0.05
    frustration: 0.05
    anger: 0.05
  secrets:
    - id: s_theft
      owner_id: self
      topic: theft
      category: crime
      hidden_from: [guard]
      stakes: 0.8
      moral_weight: 0.7
      unresolvedness: 0.0
events:
  - {type: secret_cued, t: 0, topic: theft, intensity: 1.0}
  - {type: secret_cued, t: 1, topic: theft, intensity: 1.0}
  - {type: secret_cued, t: 2, topic: theft, intensity: 1.0}
  - {type: secret_cued, t: 3, topic: theft, intensity: 1.0}
  - {type: secret_cued, t: 4, topic: theft, intensity: 1.0}
  - {type: secret_cued, t: 5, topic: theft, intensity: 1.0}
