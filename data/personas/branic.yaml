# Branic -- recruit (curious_apprentice). Bores fast on watch, reactive, weak control;
# bursts where Halgrim suppresses. Respect for Halgrim + slight resentment at his harshness.
# See docs/rpg_persona_dynamics_persony.md.
#
# Trait numbers: calibration SEED from the qualitative profile (scale ++ =0.90, + =0.75,
# - =0.50, v =0.25, vv =0.10). Seeds, not final values; data, not code.
id: branic

traits:
  reactivity: 0.75          # +
  patience: 0.25            # v
  base_self_control: 0.25   # v
  need_for_control: 0.50    # -
  pride: 0.50               # -
  novelty_seeking: 0.90     # ++
  threat_sensitivity: 0.50  # -
  trust_disposition: 0.75   # +
  gratitude: 0.50           # -
  stoicism: 0.25            # v

# Resting baseline; the shared elevated emotional state for same_soup_bad_day comes from
# the scenario's initial_overrides (applied identically to every paired persona).
initial_global_state:
  hunger: 0.20
  fatigue: 0.20
  boredom: 0.10
  stress: 0.10
  frustration: 0.00
  anger: 0.00
  satisfaction: 0.30
  self_control: 0.25

initial_relations:
  halgrim:
    trust: 0.50
    respect: 0.75
    resentment: 0.15        # slight resentment at his harshness
  marta:
    trust: 0.55
    respect: 0.50
    resentment: 0.05
  player:
    trust: 0.55
    respect: 0.50
    resentment: 0.00

# Same soup affinity as Halgrim/Wojslaw ON PURPOSE: isolates the trait contrast (identical
# soup input across the paired personas, only traits differ -> different action).
affinities:
  cabbage_soup: 0.20
