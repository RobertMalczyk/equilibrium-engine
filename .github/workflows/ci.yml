name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (engine + dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Tests (property, contrast, order-invariance, golden traces)
        # repo root on PYTHONPATH so the source-tree `eval` namespace package resolves
        # (the engine library is pip-installed; eval/ is a dev/research harness run from source)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q
